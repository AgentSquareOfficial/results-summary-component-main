<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Results summary component</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>
  <div class="container">
      <div class="results grid-flow 
       data-spacing="large">
          <h1 class="title">Your Result</h1>
          <p class="score">
            <span>76</span> of 100
          </p>
        <div class="grid-flow">
          <p class="result-rank">Great</p>
          <p>You scored higher than 65% of the people who have taken these tests.</p>
        </div>
      </div>
      <div class="summary">
        <h2 class="title">
          Summary
        </h2>
        <div class="grid-flow">

          <div class="summary-item" data-item-type="accent-1">
            <div class="flex-group">
              <img src="assets/images/icon-reaction.svg" alt="reaction">
              <h3 class="summary-item-title">Reaction</h3> 
            </div>
            <p class="summary-score">
              <span>80</span> / 100
            </p>
          </div>

          <div class="summary-item" data-item-type="accent-2">
            <div class="flex-group">
              <img src="assets/images/icon-memory.svg" alt="reaction">
              <h3 class="summary-item-title">Memory</h3> 
            </div>
            <p class="summary-score">
              <span>92</span> / 100
            </p>
          </div>

          <div class="summary-item" data-item-type="accent-3">
            <div class="flex-group">
              <img src="assets/images/icon-memory.svg" alt="reaction">
              <h3 class="summary-item-title">Verbal</h3> 
            </div>
            <p class="summary-score">
              <span>61</span> / 100
            </p>
          </div>

          <div class="summary-item" data-item-type="accent-4">
            <div class="flex-group">
              <img src="assets/images/icon-visual.svg" alt="reaction">
              <h3 class="summary-item-title">Visual</h3> 
            </div>
            <p class="summary-score">
              <span>73</span> / 100
            </p>
          </div>

        </div>
      </div>
      <button class="button">Continue</button>
  </div>

</body>
</html>
