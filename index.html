<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Results summary component</title>

  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <div class="card">
    <div class="box1">
      <div class="box2">
        <h2>Your Result</h2>
        <div class="circle">
          <span class="score">76</span>
          <span class="total">of 100</span>
        </div>
        <div class="complement">Great</div>
        <p>You scored higher than 65% of the people who have taken these tests.</p>
      </div>
      <div class="box1c">
        <h2 class="summary">Summary</h2>
        <div class="wb1">
          <div class="ls">
            <img src="assets/images/icon-reaction.svg" alt="bolt-image">
            <span class="word">Reaction</span>
          </div>
          <div class="rs">
            <span class="scr">80</span> / 100
          </div>
        </div>
        <div class="wb2">
          <div class="ls">
            <img src="assets/images/icon-memory.svg" alt="brain-image">
            <span class="word">Memory</span>
          </div>
          <div class="rs">
            <span class="scr">92</span> / 100
          </div>
        </div>
        <div class="wb3">
          <div class="ls">
            <img src="assets/images/icon-verbal.svg" alt="chat-image">
            <span class="word">Verbal</span>
          </div>
          <div class="rs">
            <span class="scr">61</span> / 100
          </div>
        </div>
        <div class="wb4">
          <div class="ls">
            <img src="assets/images/icon-visual.svg" alt="eye-image">
            <span class="word">Visual</span>
          </div>
          <div class="rs">
            <span class="scr">73</span> / 100
          </div>
        </div>
        <button type="button">Continue</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
